<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TOTK Text Browser</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <div id="mobileScrim" class="mobileScrim" hidden></div>
      <aside class="sidebar">
        <div class="brand">
          <h1>TOTK Text</h1>
          <span id="versionLabel">Loading</span>
          <button id="browseToggle" class="browseToggle" type="button" aria-expanded="false">Browse</button>
        </div>

        <div id="browsePanel" class="browsePanel">
          <label class="field">
            <span>Folder</span>
            <select id="folderSelect"></select>
          </label>
          <label class="field">
            <span>File</span>
            <select id="fileSelect"></select>
          </label>
          <div class="meta" id="fileMeta"></div>
        </div>

      </aside>

      <section class="content">
        <section class="browser">
          <div class="panelHead">
            <h2 id="browserTitle">Browser</h2>
            <div class="pager">
              <button id="prevChunk" type="button">Previous</button>
              <span id="pageInfo"></span>
              <button id="nextChunk" type="button">Next</button>
            </div>
          </div>
          <div id="rows" class="rows"></div>
        </section>
      </section>
    </main>
    <section id="searchPanel" class="searchPanel">
      <form id="searchForm" class="search">
        <input id="searchInput" type="search" placeholder="Search text, keys, readings" autocomplete="off" />
        <button type="submit">Search</button>
        <button id="clearSearch" type="button">Clear</button>
      </form>
      <div class="status" id="statusText"></div>

      <section id="resultsPanel" class="results hidden">
        <div class="panelHead">
          <h2>Search Results</h2>
          <span id="resultsMeta"></span>
        </div>
        <div id="resultsList" class="resultsList"></div>
      </section>
    </section>
    <button id="mobileFab" class="mobileFab" type="button" aria-label="Open search and browse panel" aria-expanded="false">Search</button>
    <script src="./app.js"></script>
  </body>
</html>
